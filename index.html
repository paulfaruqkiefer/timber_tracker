<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>USFS Timber Performance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        :root {
            --fs-green: #2e4d2e; --fs-light-green: #ebf2eb; --fs-gold: #b58100;
            --fs-gray: #767676; --fs-bg: #f4f4f4;
            /* 2. Set the global font to Libre Franklin */
            --fs-font: 'Libre Franklin', sans-serif;
        }
        
        body { 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: var(--fs-font); 
            background: var(--fs-bg); 
            overflow: hidden; 
        }
        
        /* 3. Center the header content */
        #top-bar { 
            height: 90px; 
            background: var(--fs-green); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; /* Centers horizontally */
            text-align: center; /* Centers multi-line text */
            padding: 0 25px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            z-index: 10;
        }
        
        #top-bar h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            font-weight: 800; 
            letter-spacing: 0.2px; 
            line-height: 1.1; 
        }
        
        #credit-line { 
            font-size: 0.8rem; 
            opacity: 0.9; 
            font-style: italic; 
            margin-top: 8px; 
            font-weight: 300;
        }

        #main-content { display: flex; flex-grow: 1; overflow: hidden; }
        #sidebar { width: 420px; background: white; overflow-y: auto; padding: 25px; border-right: 1px solid #ccc; z-index: 2; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #map-container { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        .filter-section { background: #3d633d; color: white; padding: 20px; margin: -25px -25px 20px -25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #f9f9f9; padding: 12px; border-radius: 4px; border-bottom: 3px solid #ddd; position: relative; }
        .stat-card.highlight { border-bottom-color: var(--fs-gold); }
        .stat-val { font-size: 1.1rem; font-weight: 900; color: var(--fs-green); display: block; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: var(--fs-gray); font-weight: bold; }
        
        .data-note {
            font-size: 0.7rem; line-height: 1.4; color: var(--fs-gray);
            font-style: italic; background: var(--fs-light-green);
            padding: 10px; border-radius: 4px; border-left: 3px solid var(--fs-green);
            margin-bottom: 20px;
        }

        .chart-container { height: 250px; position: relative; margin-bottom: 20px; }
        .nav-hidden { display: none !important; }
        button.reset-btn { width: 100%; padding: 12px; background: white; border: 2px solid var(--fs-green); color: var(--fs-green); font-weight: bold; cursor: pointer; font-family: var(--fs-font); }
        
        .map-legend {
            position: absolute; bottom: 30px; right: 20px;
            background: white; padding: 15px; border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2); z-index: 5; width: 200px;
        }
        .legend-gradient {
            height: 12px; width: 100%;
            background: linear-gradient(to right, #ca0020, #f4a582, #e0f3f8, #92c5de, #0571b0);
            border-radius: 2px; margin: 10px 0 5px 0;
        }
        .legend-labels { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: bold; color: var(--fs-gray); }
    </style>
</head>
<body>

<div id="top-bar">
    <h1>U.S. Forest Service timber sales: Volume offered vs. volume sold.</h1>
    <div id="credit-line">Paul Kiefer | USFS PTSAR Archive</div>
</div>

</body>
</html>
<script>
/* JS logic remains the same as your working version */
let ptsarData = [], geoData = null, chartObj = null, activeForest = null;

const FOREST_NAME_MAP = {
    "Columbia River Gorge National Scenic Area": "22 Columbia River Gorge National Scenic Area National Forest",
    "Land Between the Lakes National Recreation Area": "60 Land Between The Lakes National Forest",
    "Grand Mesa, Uncompahgre and Gunnison National Forests": "04 GrandMesa/Uncompahgre/Gunnison National Forest",
    "Lake Tahoe Basin Management Unit": "19 Lake Tahoe Basin National Forest",
    "National Forests in Alabama": "01 NFS In Alabama National Forest",
    "National Forests in Florida": "05 NFS In Florida National Forest",
    "National Forests in Mississippi": "07 NFS In Mississippi National Forest",
    "National Forests in North Carolina": "11 NFS in N. Carolina National Forest",
    "National Forests in Texas": "13 NFS In Texas National Forest",
    "Francis Marion and Sumter National Forests": "12 Francis Marion-Sumter National Forest",
    "Green Mountain and Finger Lakes National Forests": "20 Green Mountain National Forest"
};

function normalizeName(name) {
    if (!name) return "";
    return name.toString().toLowerCase()
        .replace(/^\d+\s*/, '').replace(/\//g, '-').replace(/ national forest(s?)/g, '')
        .replace(/ national scenic area/g, '').replace(/ national recreation area/g, '')
        .replace(/ national tallgrass prairie/g, '').replace(/ management unit/g, '')
        .replace(/ and /g, '-').replace(/ & /g, '-').replace(/[.,]/g, '')
        .replace(/\s+/g, '').replace(/-+/g, '').trim();
}

mapboxgl.accessToken = 'pk.eyJ1IjoicGtpZWZlciIsImEiOiJjbWxqeWRsNzMwNHV5M3FweTMyemY5emQzIn0.iPzQxYOu7uNUkophKSfiLA';

Promise.all([
    fetch('data/PTSAR_2006_2025_master.csv').then(r => r.text()),
    fetch('shapefiles/national_forest_boundaries.json').then(r => r.json())
]).then(([csvText, geoJson]) => {
    ptsarData = Papa.parse(csvText, { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
    geoData = geoJson;
    initYearFilter();
    initMap();
}).catch(err => console.error("Load Error:", err));

function initYearFilter() {
    const sel = document.getElementById('year-filter');
    sel.innerHTML = "";
    for(let y=2025; y>=2007; y--) {
        let opt = document.createElement('option');
        opt.value = y; opt.innerText = y + " Performance Snapshot";
        sel.appendChild(opt);
    }
}

function initMap() {
    const map = new mapboxgl.Map({
        container: 'map', style: 'mapbox://styles/mapbox/light-v11',
        center: [-98.5, 39.8], zoom: 3.5
    });

    map.on('load', () => {
        map.addSource('forests', { type: 'geojson', data: geoData });
        map.addLayer({
            id: 'forest-fills', type: 'fill', source: 'forests',
            paint: { 'fill-color': '#cccccc', 'fill-opacity': 0.6 }
        });
        map.addLayer({
            id: 'forest-borders', type: 'line', source: 'forests',
            paint: { 'line-color': '#ffffff', 'line-width': 0.5 }
        });
        map.on('click', 'forest-fills', (e) => selectForest(e.features[0].properties.FORESTNAME));
        map.on('mouseenter', 'forest-fills', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'forest-fills', () => map.getCanvas().style.cursor = '');
        updateMapAndStats();
    });
    window.map = map;
}

function findCsvKeyForForest(jsonName, currentYearData) {
    const mappedValue = FOREST_NAME_MAP[jsonName];
    if (mappedValue) return mappedValue;
    const normGeo = normalizeName(jsonName);
    const match = currentYearData.find(d => normalizeName(d.Forest) === normGeo);
    if (match) return match.Forest;
    const fuzzy = currentYearData.find(d => {
        const nCsv = normalizeName(d.Forest);
        return normGeo.includes(nCsv) || nCsv.includes(normGeo);
    });
    return fuzzy ? fuzzy.Forest : null;
}

function updateMapAndStats() {
    const year = parseInt(document.getElementById('year-filter').value);
    if (!ptsarData.length || !geoData) return;
    const currentYearData = ptsarData.filter(d => d.Year === year && d.Forest !== "Region Total");
    const colorExpr = ['match', ['get', 'FORESTNAME']];
    let activeCsvKey = null;
    geoData.features.forEach(f => {
        const geoName = f.properties.FORESTNAME;
        const csvKey = findCsvKeyForForest(geoName, currentYearData);
        if (activeForest === geoName) activeCsvKey = csvKey;
        const data = currentYearData.find(d => d.Forest === csvKey);
        if (data) {
            const att = parseFloat(data.CCF_Attainment) || 0;
            const off = parseFloat(data.CCF_Offer) || 0;
            let color = "#cccccc"; 
            if (off > 0) {
                const pct = att / off;
                if (pct >= 1.10) color = "#0571b0"; 
                else if (pct >= 0.95) color = "#92c5de"; 
                else if (pct >= 0.85) color = "#e0f3f8"; 
                else if (pct >= 0.50) color = "#f4a582"; 
                else color = "#ca0020"; 
            } else if (att > 0) { color = "#0571b0"; }
            colorExpr.push(geoName, color);
        }
    });
    colorExpr.push('#cccccc');
    if (window.map && window.map.getLayer('forest-fills')) {
        window.map.setPaintProperty('forest-fills', 'fill-color', colorExpr);
    }
    let displayData, trendData;
    if (!activeForest) {
        document.getElementById('view-title').innerText = "Service-Wide View";
        displayData = ptsarData.filter(d => d.Year === year && d.Forest === "Region Total");
        trendData = ptsarData.filter(d => d.Forest === "Region Total");
    } else {
        document.getElementById('view-title').innerText = activeForest;
        displayData = ptsarData.filter(d => d.Year === year && d.Forest === activeCsvKey);
        trendData = ptsarData.filter(d => d.Forest === activeCsvKey);
    }
    updateSidebarStats(displayData);
    renderTrendChart(trendData);
}

function updateSidebarStats(data) {
    const row = data[0] || {}; 
    const att = parseFloat(row.CCF_Attainment) || 0;
    const off = parseFloat(row.CCF_Offer) || 0;
    const mbf = parseFloat(row.MBF_Attainment) || 0;
    document.getElementById('stat-attainment').innerText = Math.round(att).toLocaleString();
    document.getElementById('stat-offer').innerText = Math.round(off).toLocaleString();
    document.getElementById('stat-mbf').innerText = Math.round(mbf).toLocaleString();
    document.getElementById('stat-pct').innerText = off > 0 ? ((att/off)*100).toFixed(1) + "%" : "0%";
}

function renderTrendChart(trendData) {
    const canvas = document.getElementById('sidebarChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (chartObj) chartObj.destroy();
    const years = Array.from(new Set(ptsarData.map(d => d.Year))).sort();
    const attValues = years.map(y => trendData.filter(d => d.Year == y).reduce((s, d) => s + (parseFloat(d.CCF_Attainment) || 0), 0));
    const offValues = years.map(y => trendData.filter(d => d.Year == y).reduce((s, d) => s + (parseFloat(d.CCF_Offer) || 0), 0));
    chartObj = new Chart(ctx, {
        type: 'line',
        data: {
            labels: years,
            datasets: [
                { label: 'Sold', data: attValues, borderColor: '#2e4d2e', backgroundColor: '#2e4d2e', fill: false, borderWidth: 3 },
                { label: 'Offered', data: offValues, borderColor: '#b58100', borderDash: [5,5], fill: false, borderWidth: 2 }
            ]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { usePointStyle: true, pointStyle: 'line' } } },
            scales: { y: { beginAtZero: true } }
        }
    });
}

function selectForest(name) {
    activeForest = name;
    document.getElementById('back-button-container').classList.remove('nav-hidden');
    updateMapAndStats();
}

function resetToNational() {
    activeForest = null;
    document.getElementById('back-button-container').classList.add('nav-hidden');
    updateMapAndStats();
}
</script>
</body>
</html>
